<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazabi Master OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body, html { font-family: 'Pretendard', -apple-system, sans-serif; height: 100%; margin: 0; overflow: hidden; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    
    @keyframes pulse-border {
      0% { border-color: rgba(239, 68, 68, 1); box-shadow: inset 0 0 10px rgba(239,68,68,0.2); }
      50% { border-color: rgba(239, 68, 68, 0.2); box-shadow: inset 0 0 0px rgba(239,68,68,0); }
      100% { border-color: rgba(239, 68, 68, 1); box-shadow: inset 0 0 10px rgba(239,68,68,0.2); }
    }
    .error-pulse { animation: pulse-border 1.5s infinite; }

    /* 💡 수정됨: 조건부 텍스트 흐름 효과 */
    .marquee-container { width: 150px; overflow: hidden; position: relative; white-space: nowrap; display: flex; align-items: center; }
    .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 6s linear infinite; }
    @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
  </style>
</head>
<body>
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const GRADE_GROUP_DATA = {
      '1-2': {
        grades: [1, 2], total: 1700,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 442 },
          { id: 'math', name: '수학', subjects: ['math'], std: 256 },
          { id: 'integrated', name: '바/슬/즐', subjects: ['disciplined', 'wise', 'pleasant'], std: 738 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 264 }
        ]
      },
      '3-4': {
        grades: [3, 4], total: 1972,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science', name: '과학', subjects: ['science'], std: 204 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 136 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 204 }
        ]
      },
      '5-6': {
        grades: [5, 6], total: 2176,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science_practical', name: '과학/실과', subjects: ['science', 'practical'], std: 340 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 204 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_volunteer', 'creative_career'], std: 204 }
        ]
      }
    };

    const SUBJECT_NAME = {
      korean: '국어', social: '사회', moral: '도덕', math: '수학', science: '과학',
      practical: '실과', physical: '체육', music: '음악', art: '미술', english: '영어',
      disciplined: '바른생활', wise: '슬기로운생활', pleasant: '즐거운생활',
      creative_auto: '자율·자치', creative_club: '동아리', creative_volunteer: '봉사', creative_career: '진로'
    };

    const getAllSubjects = (groupId) => {
      let subs = [];
      GRADE_GROUP_DATA[groupId].groups.forEach(g => {
        g.subjects.forEach(s => subs.push({ id: s, name: SUBJECT_NAME[s], group: g.name }));
      });
      return subs;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('시수편제');
      const [selectedGroup, setSelectedGroup] = useState('5-6');
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [isDarkMode, setIsDarkMode] = useState(false);

      const [allHours, setAllHours] = useState(() => {
        const initial = {};
        [1, 2, 3, 4, 5, 6].forEach(g => { initial[g] = {}; });
        Object.values(GRADE_GROUP_DATA).forEach(groupData => {
          const [g1, g2] = groupData.grades;
          groupData.groups.forEach(gInfo => {
            gInfo.subjects.forEach(sub => {
              const perSem = Math.floor(gInfo.std / gInfo.subjects.length / 4);
              const remainder = (gInfo.std / gInfo.subjects.length) - (perSem * 4);
              initial[g1][sub] = { s1: perSem, s2: perSem };
              initial[g2][sub] = { s1: perSem, s2: perSem + Math.round(remainder) };
            });
          });
        });
        return initial;
      });

      const [autoTimes, setAutoTimes] = useState([]);
      const [modalState, setModalState] = useState({ isOpen: false, grade: null, editingId: null });
      const [formData, setFormData] = useState({ linkedSub: '', name: '' });

      const handleInput = (grade, sub, sem, val) => {
        const strVal = String(val).replace(/^0+/, ''); 
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setAllHours(prev => ({
          ...prev, [grade]: { ...prev[grade], [sub]: { ...prev[grade][sub], [sem]: num } }
        }));
      };

      const handleAutoTimeHours = (id, sem, val) => {
        const strVal = String(val).replace(/^0+/, '');
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setAutoTimes(prev => prev.map(item => item.id === id ? { ...item, [sem]: num } : item));
      };

      const openModal = (grade, editId = null) => {
        if (!editId && autoTimes.filter(a => a.grade === grade).length >= 2) {
          alert(`${grade}학년 자율시간은 최대 2개까지만 추가할 수 있습니다.`);
          return;
        }
        if (editId) {
          const item = autoTimes.find(a => a.id === editId);
          setFormData({ linkedSub: item.linkedSub, name: item.name });
        } else setFormData({ linkedSub: '', name: '' });
        setModalState({ isOpen: true, grade, editingId: editId });
      };

      const saveModal = () => {
        if (!formData.linkedSub || !formData.name.trim()) return alert('연계 교과와 자율시간 과목명을 입력해주세요.');
        if (modalState.editingId) {
          setAutoTimes(prev => prev.map(item => item.id === modalState.editingId ? { ...item, linkedSub: formData.linkedSub, name: formData.name } : item));
        } else {
          setAutoTimes(prev => [...prev, { id: Date.now().toString(), grade: modalState.grade, linkedSub: formData.linkedSub, name: formData.name, s1: 0, s2: 0 }]);
        }
        setModalState({ isOpen: false, grade: null, editingId: null });
      };

      // 💡 삭제 오류 수정: stopPropagation을 적용하여 삭제 로직 완벽 보완
      const deleteAutoTime = (e, id) => {
        e.stopPropagation();
        if(confirm('이 자율시간을 삭제하시겠습니까? (입력된 시수도 삭제됩니다)')) {
          setAutoTimes(prev => prev.filter(a => a.id !== id));
        }
      };

      const analysisAll = useMemo(() => {
        const result = {};
        let hasAnyGlobalError = false;

        Object.keys(GRADE_GROUP_DATA).forEach(groupId => {
          const config = GRADE_GROUP_DATA[groupId];
          const [g1, g2] = config.grades;
          let groupTotal = 0;
          
          const groupStats = config.groups.map(g => {
            let sum = g.subjects.reduce((s, sub) => s + allHours[g1][sub].s1 + allHours[g1][sub].s2 + allHours[g2][sub].s1 + allHours[g2][sub].s2, 0);
            autoTimes.forEach(auto => {
              if ((auto.grade === g1 || auto.grade === g2) && g.subjects.includes(auto.linkedSub)) sum += auto.s1 + auto.s2;
            });
            groupTotal += sum;
            const diff = sum - g.std;
            const variancePercent = Math.round((diff / g.std) * 100);
            const isOver20 = variancePercent > 20;
            const isUnder20 = variancePercent < -20;
            return { ...g, current: sum, diff, variancePercent, isOver20, isUnder20 };
          });

          const isTotalDeficient = groupTotal < config.total;
          const hasAnyError = isTotalDeficient || groupStats.some(g => g.isOver20 || g.isUnder20);
          if (hasAnyError) hasAnyGlobalError = true;

          result[groupId] = { groupStats, groupTotal, targetTotal: config.total, grades: [g1, g2], isTotalDeficient, hasAnyError };
        });

        return { groups: result, hasAnyGlobalError };
      }, [allHours, autoTimes]);

      const curAnalysis = analysisAll.groups[selectedGroup];

      const handleSaveClick = () => {
        if (curAnalysis.hasAnyError) setShowSaveModal(true);
        else alert('결함 없이 완벽합니다. 성공적으로 저장되었습니다.');
      };

      return (
        <div className={`h-full ${isDarkMode ? 'dark' : ''}`}>
          <div className="flex h-screen text-slate-800 dark:text-slate-200 bg-slate-100 dark:bg-slate-950 overflow-hidden relative transition-colors duration-300">
            
            <aside className="w-52 bg-slate-900 dark:bg-black flex flex-col shadow-2xl z-20 shrink-0 transition-colors duration-300 border-r border-slate-800 dark:border-slate-800">
              <div className="p-5 border-b border-slate-800 flex items-center gap-2">
                <i className="fa-solid fa-shield-halved text-blue-500 text-lg"></i>
                <h1 className="text-white font-black text-sm uppercase tracking-tight">Sazabi OS</h1>
              </div>
              <nav className="flex-grow p-3 space-y-1 overflow-y-auto custom-scrollbar">
                <MenuBtn icon="fa-chart-pie" label="대시보드" active={activeTab === '대시보드'} onClick={() => setActiveTab('대시보드')} />
                <MenuBtn icon="fa-calculator" label="시수편제" active={activeTab === '시수편제'} onClick={() => setActiveTab('시수편제')} />
                <MenuBtn icon="fa-calendar-days" label="학사일정" active={activeTab === '학사일정'} onClick={() => setActiveTab('학사일정')} />
                <MenuBtn icon="fa-file-lines" label="학생평가" active={activeTab === '학생평가'} onClick={() => setActiveTab('학생평가')} />
                <MenuBtn icon="fa-gear" label="시스템설정" active={activeTab === '설정'} onClick={() => setActiveTab('설정')} />
              </nav>
              <div className="p-4 bg-slate-950 dark:bg-slate-900 border-t border-slate-800 flex items-center gap-3">
                <i className="fa-solid fa-user text-slate-400 text-xs"></i>
                <span className="text-slate-300 text-xs font-bold">사자비 부장</span>
              </div>
            </aside>

            <main className="flex-grow flex flex-col min-w-0 relative">
              <header className="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 shadow-sm z-10 shrink-0 transition-colors duration-300">
                <div className="flex items-center gap-4">
                  <h2 className="text-lg font-black">{activeTab}</h2>
                  {activeTab === '시수편제' && (
                    <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200 dark:border-slate-700">
                      {Object.keys(GRADE_GROUP_DATA).map(group => (
                        <button 
                          key={group} onClick={() => setSelectedGroup(group)}
                          className={`px-3 py-1.5 rounded-md text-sm font-bold transition-all ${selectedGroup === group ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm border border-slate-300 dark:border-slate-600' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}
                        >
                          {group}학년군
                        </button>
                      ))}
                      <button 
                        onClick={() => setSelectedGroup('all')}
                        className={`ml-1 px-4 py-1.5 rounded-md text-sm font-bold transition-all ${selectedGroup === 'all' ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}
                      >
                        <i className="fa-solid fa-print mr-1"></i> 전체보기(출력)
                      </button>
                    </div>
                  )}
                </div>
                
                {activeTab === '시수편제' && selectedGroup !== 'all' && (
                  <div className="flex items-center gap-4">
                    <div className={`px-5 py-2 rounded-xl border-2 flex items-center gap-3 transition-all ${curAnalysis.isTotalDeficient ? 'bg-red-50 dark:bg-red-900/30 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] animate-pulse' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700'}`}>
                      <span className={`text-xs font-bold uppercase ${curAnalysis.isTotalDeficient ? 'text-red-500 dark:text-red-400' : 'text-slate-500 dark:text-slate-400'}`}>학년군 총 시수</span>
                      <span className={`text-lg font-black ${curAnalysis.isTotalDeficient ? 'text-red-700 dark:text-red-400' : 'text-green-600 dark:text-green-400'}`}>
                        {curAnalysis.groupTotal} <span className="text-sm font-bold text-slate-400">/ {curAnalysis.targetTotal}H</span>
                      </span>
                    </div>
                    <button onClick={handleSaveClick} className="flex items-center gap-2 px-6 py-2.5 bg-slate-900 dark:bg-blue-600 text-white rounded-xl font-bold text-sm shadow-md hover:bg-black dark:hover:bg-blue-700 transition-all">
                      <i className="fa-solid fa-floppy-disk"></i> 저장
                    </button>
                  </div>
                )}
              </header>

              <div className="flex-grow p-6 overflow-hidden flex flex-col">
                {activeTab === '시수편제' && selectedGroup !== 'all' && (
                  <CurriculumScreen 
                    analysis={curAnalysis} allHours={allHours} handleInput={handleInput} 
                    autoTimes={autoTimes} openModal={openModal} handleAutoTimeHours={handleAutoTimeHours} deleteAutoTime={deleteAutoTime}
                  />
                )}
                {/* 💡 전 학년 상세 출력/보기 화면 컴포넌트 */}
                {activeTab === '시수편제' && selectedGroup === 'all' && (
                  <AllGradesDetailedScreen analysisAll={analysisAll} allHours={allHours} autoTimes={autoTimes} />
                )}
                {activeTab === '설정' && (
                  <SettingsScreen isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
                )}
                {activeTab === '대시보드' && <DashboardScreen analysisAll={analysisAll} />}
                {!['시수편제', '대시보드', '설정'].includes(activeTab) && (
                  <div className="flex-grow flex flex-col items-center justify-center text-slate-400 dark:text-slate-600">
                    <i className="fa-solid fa-gear fa-spin text-5xl mb-4 opacity-50"></i>
                    <h3 className="text-lg font-bold">{activeTab} 모듈 준비 중</h3>
                  </div>
                )}
              </div>
            </main>
          </div>

          {/* 자율시간 팝업 모달 */}
          {modalState.isOpen && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center">
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 max-w-md w-full shadow-2xl border border-slate-200 dark:border-slate-700 animate-in zoom-in-95">
                <h3 className="text-lg font-black mb-6 border-b dark:border-slate-700 pb-3"><i className="fa-solid fa-flask text-blue-500 mr-2"></i> {modalState.grade}학년 학교 자율시간 추가</h3>
                <div className="space-y-4 mb-8">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">연계 교과 (필수)</label>
                    <select value={formData.linkedSub} onChange={e => setFormData({...formData, linkedSub: e.target.value})} className="w-full p-2.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-lg text-sm font-medium outline-none">
                      <option value="">-- 교과를 선택하세요 --</option>
                      {getAllSubjects(selectedGroup).map(s => <option key={s.id} value={s.id}>[{s.group}] {s.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">자율시간 과목명 (필수)</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="예: 지역 연계 생태 탐구" className="w-full p-2.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-lg text-sm font-bold outline-none" />
                  </div>
                </div>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setModalState({isOpen: false})} className="px-5 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 font-bold rounded-xl text-sm">취소</button>
                  <button onClick={saveModal} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm">저장 및 반영</button>
                </div>
              </div>
            </div>
          )}

          {/* 저장 경고 모달 */}
          {showSaveModal && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 max-w-lg w-full shadow-2xl">
                <div className="flex items-center gap-4 text-red-600 mb-5 border-b dark:border-slate-700 pb-4">
                  <i className="fa-solid fa-triangle-exclamation text-3xl"></i>
                  <div><h3 className="text-xl font-black">시수 편제 경고</h3><p className="text-sm font-bold text-red-500">법정 기준과 어긋나는 항목이 있습니다.</p></div>
                </div>
                <div className="mb-6 space-y-3 bg-slate-50 dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-700 text-sm font-medium">
                  {curAnalysis.isTotalDeficient && <p className="text-red-600 flex items-start gap-2"><i className="fa-solid fa-xmark mt-1"></i> 학년군 총 시수 미달</p>}
                  {curAnalysis.groupStats.filter(g => g.isOver20 || g.isUnder20).map(g => <p key={g.id} className="text-rose-600 flex items-start gap-2"><i className="fa-solid fa-xmark mt-1"></i> [{g.name}] 증감 한계 이탈 ({g.variancePercent}%)</p>)}
                </div>
                <div className="flex justify-center gap-3">
                  <button onClick={() => setShowSaveModal(false)} className="px-6 py-2.5 bg-slate-200 dark:bg-slate-700 font-bold rounded-xl">수정하기</button>
                  <button onClick={() => { setShowSaveModal(false); alert('강제 저장되었습니다.'); }} className="px-6 py-2.5 bg-red-600 text-white font-bold rounded-xl">무시하고 저장</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /** * 💡 [전 학년 상세 출력/보기 화면 컴포넌트]
     * 뭉뚱그린 요약이 아닌, 1~6학년 모든 교과와 자율시간을 표로 쫙 뽑아주는 컴포넌트입니다.
     * 실제 작동하는 HWP 다운로드(HTML 렌더링) 기능 포함.
     */
    function AllGradesDetailedScreen({ analysisAll, allHours, autoTimes }) {
      
      // 💡 HWP 파일로 내보내는 실제 엔진 로직
      const exportToHWP = () => {
        let htmlContent = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>교육과정 편제표</title><style>table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11pt; font-family: 'Malgun Gothic', sans-serif; } th, td { border: 1px solid black; padding: 5px; } th { background-color: #f2f2f2; } .group-name { font-weight: bold; background-color: #f9f9f9; } .error { color: red; font-weight: bold; }</style></head><body>`;
        htmlContent += `<h1 style="text-align: center; font-family: 'Malgun Gothic';">전 학년 교육과정 시수 편제표</h1><br/>`;

        Object.keys(GRADE_GROUP_DATA).forEach(groupId => {
          const config = GRADE_GROUP_DATA[groupId];
          const [g1, g2] = config.grades;
          const data = analysisAll.groups[groupId];
          
          htmlContent += `<h2>${groupId}학년군 (총 시수: ${data.groupTotal}/${data.targetTotal}H)</h2>`;
          htmlContent += `<table><thead><tr><th rowspan="2">교과군</th><th rowspan="2">교과목</th><th colspan="3">${g1}학년</th><th colspan="3">${g2}학년</th><th rowspan="2">기준</th><th rowspan="2">편제합계</th><th rowspan="2">증감(%)</th></tr><tr><th>1학기</th><th>2학기</th><th>소계</th><th>1학기</th><th>2학기</th><th>소계</th></tr></thead><tbody>`;

          data.groupStats.forEach((group, gIdx) => {
            const groupAutoTimes = autoTimes.filter(a => group.subjects.includes(a.linkedSub) && (a.grade === g1 || a.grade === g2));
            const rowSpanCount = group.subjects.length + groupAutoTimes.length;
            const hasError = group.isOver20 || group.isUnder20;
            const diffText = group.diff > 0 ? `+${group.diff}` : group.diff;

            group.subjects.forEach((sub, sIdx) => {
              const g1s1 = allHours[g1][sub].s1; const g1s2 = allHours[g1][sub].s2;
              const g2s1 = allHours[g2][sub].s1; const g2s2 = allHours[g2][sub].s2;
              const subAutoTimes = autoTimes.filter(a => a.linkedSub === sub && (a.grade === g1 || a.grade === g2));

              htmlContent += `<tr>`;
              if (sIdx === 0) htmlContent += `<td rowspan="${rowSpanCount}" class="group-name ${hasError ? 'error' : ''}">${group.name}</td>`;
              htmlContent += `<td>${SUBJECT_NAME[sub]}</td><td>${g1s1}</td><td>${g1s2}</td><td>${g1s1+g1s2}</td><td>${g2s1}</td><td>${g2s2}</td><td>${g2s1+g2s2}</td>`;
              if (sIdx === 0) {
                htmlContent += `<td rowspan="${rowSpanCount}">${group.std}</td><td rowspan="${rowSpanCount}" class="${hasError ? 'error' : ''}">${group.current}</td><td rowspan="${rowSpanCount}" class="${hasError ? 'error' : ''}">${diffText} (${group.variancePercent}%)</td>`;
              }
              htmlContent += `</tr>`;

              // 자율시간
              subAutoTimes.forEach(aTime => {
                htmlContent += `<tr style="background-color: #f0f8ff;">`;
                htmlContent += `<td style="text-align: left;">└ [${aTime.grade}학년] ${aTime.name}</td>`;
                if(aTime.grade === g1) {
                  htmlContent += `<td>${aTime.s1}</td><td>${aTime.s2}</td><td>${aTime.s1+aTime.s2}</td><td></td><td></td><td></td>`;
                } else {
                  htmlContent += `<td></td><td></td><td></td><td>${aTime.s1}</td><td>${aTime.s2}</td><td>${aTime.s1+aTime.s2}</td>`;
                }
                htmlContent += `</tr>`;
              });
            });
          });
          htmlContent += `</tbody></table><br/><br/>`;
        });
        htmlContent += `</body></html>`;

        // Blob 생성 및 다운로드 (MIME 타입을 msword로 설정하면 한글/워드에서 열립니다)
        const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `전학년_교육과정_편제표.hwp`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="flex-grow flex flex-col gap-4 overflow-hidden">
          <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0">
            <div>
              <h2 className="text-xl font-black">전 학년 통합 편제표</h2>
              <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">1~6학년 전체의 시수 편제와 결함 여부를 한눈에 확인하고 HWP로 출력합니다.</p>
            </div>
            <button onClick={exportToHWP} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg flex items-center gap-2 transition-colors">
              <i className="fa-solid fa-download"></i> HWP 한글파일 출력 (진짜 다운로드됨)
            </button>
          </div>

          <div className="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-6">
            {Object.keys(GRADE_GROUP_DATA).map(groupId => {
              const data = analysisAll.groups[groupId];
              const config = GRADE_GROUP_DATA[groupId];
              const [g1, g2] = config.grades;
              const hasGlobalError = data.hasAnyError;
              
              return (
                <div key={groupId} className={`bg-white dark:bg-slate-800 border-2 rounded-xl overflow-hidden transition-all ${hasGlobalError ? 'error-pulse border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : 'border-slate-200 dark:border-slate-700 shadow-sm'}`}>
                  <div className={`p-4 flex justify-between items-center border-b ${hasGlobalError ? 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800' : 'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700'}`}>
                    <h3 className={`text-lg font-black ${hasGlobalError ? 'text-red-700 dark:text-red-400' : 'text-slate-800 dark:text-slate-200'}`}>
                      {groupId}학년군 편제표 (총합: {data.groupTotal}/{data.targetTotal}H)
                    </h3>
                    {hasGlobalError && <span className="text-xs font-bold text-red-600 bg-red-100 px-3 py-1 rounded-full"><i className="fa-solid fa-triangle-exclamation"></i> 오류 수정 필요</span>}
                  </div>
                  
                  {/* 각 학년군별 상세 테이블 (읽기 전용) */}
                  <table className="w-full text-center text-[12px] border-collapse">
                    <thead className="bg-slate-100 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 font-bold">
                      <tr>
                        <th className="py-2 border-r dark:border-slate-700 w-20">교과군</th>
                        <th className="py-2 border-r dark:border-slate-700 w-28">교과목</th>
                        <th className="py-2 border-r dark:border-slate-700 text-blue-700 dark:text-blue-400">{g1}학년 소계</th>
                        <th className="py-2 border-r dark:border-slate-700 text-emerald-700 dark:text-emerald-400">{g2}학년 소계</th>
                        <th className="py-2 border-r dark:border-slate-700 w-16">기준</th>
                        <th className="py-2 border-r dark:border-slate-700 w-16">합계</th>
                        <th className="py-2 w-16">증감</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50 text-slate-700 dark:text-slate-300">
                      {data.groupStats.map(group => {
                        const hasGroupError = group.isOver20 || group.isUnder20;
                        const groupAutoTimes = autoTimes.filter(a => group.subjects.includes(a.linkedSub) && (a.grade === g1 || a.grade === g2));
                        const rowSpanCount = group.subjects.length + groupAutoTimes.length;

                        return (
                          <React.Fragment key={group.id}>
                            {group.subjects.map((sub, idx) => {
                              const subAutoTimes = autoTimes.filter(a => a.linkedSub === sub && (a.grade === g1 || a.grade === g2));
                              return (
                                <tr key={sub} className="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                                  {idx === 0 && (
                                    <td rowSpan={rowSpanCount} className={`border-r dark:border-slate-700 font-bold ${hasGroupError ? 'text-red-600 bg-red-50/50 dark:bg-red-900/10' : 'bg-slate-50/50 dark:bg-slate-900/50'}`}>{group.name}</td>
                                  )}
                                  <td className="py-2 border-r dark:border-slate-700">{SUBJECT_NAME[sub]}</td>
                                  <td className="py-2 border-r dark:border-slate-700 font-medium">{allHours[g1][sub].s1 + allHours[g1][sub].s2}</td>
                                  <td className="py-2 border-r dark:border-slate-700 font-medium">{allHours[g2][sub].s1 + allHours[g2][sub].s2}</td>
                                  
                                  {idx === 0 && (
                                    <>
                                      <td rowSpan={rowSpanCount} className="border-r dark:border-slate-700 font-bold text-slate-400">{group.std}</td>
                                      <td rowSpan={rowSpanCount} className={`border-r dark:border-slate-700 font-black ${hasGroupError ? 'text-red-600' : 'text-blue-600 dark:text-blue-400'}`}>{group.current}</td>
                                      <td rowSpan={rowSpanCount} className={`font-bold ${hasGroupError ? 'text-red-600' : ''}`}>{group.diff > 0 ? `+${group.diff}` : group.diff}<br/><span className="text-[10px] font-normal opacity-70">({group.variancePercent}%)</span></td>
                                    </>
                                  )}
                                </tr>
                              );
                            })}
                            {/* 자율시간 서브로우 (읽기 전용 표시) */}
                            {groupAutoTimes.map(aTime => (
                               <tr key={aTime.id} className="bg-blue-50/30 dark:bg-blue-900/10 text-[11px]">
                                 <td className="py-1.5 px-3 border-r dark:border-slate-700 text-left text-blue-700 dark:text-blue-400 font-bold">└ [{aTime.grade}학년] {aTime.name}</td>
                                 <td className="py-1.5 border-r dark:border-slate-700 text-blue-600 dark:text-blue-400">{aTime.grade === g1 ? aTime.s1 + aTime.s2 : ''}</td>
                                 <td className="py-1.5 border-r dark:border-slate-700 text-blue-600 dark:text-blue-400">{aTime.grade === g2 ? aTime.s1 + aTime.s2 : ''}</td>
                               </tr>
                            ))}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /** * 💡 메인 편제표 렌더링 컴포넌트 (텍스트 흐름 및 입력 버그 완전 수정)
     */
    function CurriculumScreen({ analysis, allHours, handleInput, autoTimes, openModal, handleAutoTimeHours, deleteAutoTime }) {
      const [g1, g2] = analysis.grades;

      return (
        <div className="flex-grow flex flex-col gap-4 overflow-hidden">
          <div className="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 shadow-sm rounded-xl overflow-y-auto custom-scrollbar flex-grow pb-8">
            <table className="w-full border-collapse">
              <thead className="bg-slate-100 dark:bg-slate-900 border-b-2 border-slate-300 dark:border-slate-700 sticky top-0 z-10">
                <tr className="text-[13px] font-bold text-slate-600 dark:text-slate-300 text-center">
                  <th className="py-2 px-2 border-r dark:border-slate-700 w-24">교과군</th>
                  <th className="py-2 px-2 border-r dark:border-slate-700 w-28">교과목</th>
                  <th colSpan={3} className="py-2 px-2 border-r dark:border-slate-700 bg-blue-50/80 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300">{g1}학년</th>
                  <th colSpan={3} className="py-2 px-2 border-r dark:border-slate-700 bg-emerald-50/80 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-300">{g2}학년</th>
                  <th className="py-2 px-2 border-r dark:border-slate-700 w-16">기준</th>
                  <th className="py-2 px-2 border-r dark:border-slate-700 w-16">합계</th>
                  <th className="py-2 px-2 w-20">증감(%)</th>
                </tr>
                <tr className="text-[11px] font-bold text-slate-500 dark:text-slate-400 text-center bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                  <th className="py-1.5 border-r dark:border-slate-700"></th>
                  <th className="py-1.5 border-r dark:border-slate-700"></th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-[4.5rem]">1학기</th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-[4.5rem]">2학기</th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-12 bg-slate-50 dark:bg-slate-900">소계</th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-[4.5rem]">1학기</th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-[4.5rem]">2학기</th>
                  <th className="py-1.5 border-r dark:border-slate-700 w-12 bg-slate-50 dark:bg-slate-900">소계</th>
                  <th className="py-1.5 border-r dark:border-slate-700"></th>
                  <th className="py-1.5 border-r dark:border-slate-700"></th>
                  <th className="py-1.5"></th>
                </tr>
              </thead>
              
              {analysis.groupStats.map((group) => {
                const hasError = group.isOver20 || group.isUnder20;
                const tbodyClass = hasError ? "error-pulse border-2 bg-red-50/10 dark:bg-red-900/20 relative z-0" : "border-b border-slate-200 dark:border-slate-700";
                const groupAutoTimes = autoTimes.filter(a => group.subjects.includes(a.linkedSub) && (a.grade === g1 || a.grade === g2));
                const rowSpanCount = group.subjects.length + groupAutoTimes.length;

                return (
                  <tbody key={group.id} className={`text-center text-[13px] ${tbodyClass}`}>
                    {group.subjects.map((sub, idx) => {
                      const g1s1 = allHours[g1][sub].s1; const g1s2 = allHours[g1][sub].s2;
                      const g2s1 = allHours[g2][sub].s1; const g2s2 = allHours[g2][sub].s2;
                      const subTotal1 = g1s1 + g1s2; const subTotal2 = g2s1 + g2s2;
                      const subAutoTimes = autoTimes.filter(a => a.linkedSub === sub && (a.grade === g1 || a.grade === g2));

                      return (
                        <React.Fragment key={sub}>
                          <tr className="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors border-b border-slate-100 dark:border-slate-700/50">
                            {idx === 0 && (
                              <td rowSpan={rowSpanCount} className="p-2 border-r dark:border-slate-700 align-middle bg-slate-50/50 dark:bg-slate-900/50">
                                <span className={`font-bold leading-tight ${hasError ? 'text-red-600' : 'text-slate-700 dark:text-slate-300'}`}>{group.name}</span>
                              </td>
                            )}
                            <td className="p-2 border-r dark:border-slate-700 font-bold text-slate-700 dark:text-slate-300 text-[12px]">{SUBJECT_NAME[sub]}</td>
                            {renderInputCell(g1, sub, 's1', g1s1, handleInput)}
                            {renderInputCell(g1, sub, 's2', g1s2, handleInput)}
                            <td className="p-2 border-r dark:border-slate-700 font-bold text-slate-400 dark:text-slate-500 bg-slate-50/50 dark:bg-slate-900/50 text-[11px]">{subTotal1}</td>
                            {renderInputCell(g2, sub, 's1', g2s1, handleInput)}
                            {renderInputCell(g2, sub, 's2', g2s2, handleInput)}
                            <td className="p-2 border-r dark:border-slate-700 font-bold text-slate-400 dark:text-slate-500 bg-slate-50/50 dark:bg-slate-900/50 text-[11px]">{subTotal2}</td>
                            {idx === 0 && (
                              <>
                                <td rowSpan={rowSpanCount} className="p-2 border-r dark:border-slate-700 align-middle text-slate-500 font-bold">{group.std}</td>
                                <td rowSpan={rowSpanCount} className={`p-2 border-r dark:border-slate-700 align-middle font-black text-[15px] ${hasError ? 'text-red-600' : 'text-blue-700 dark:text-blue-400'}`}>{group.current}</td>
                                <td rowSpan={rowSpanCount} className={`p-2 align-middle font-bold text-[12px] ${hasError ? 'text-red-600' : 'text-slate-500 dark:text-slate-400'}`}>
                                  {group.diff > 0 ? `+${group.diff}` : group.diff}
                                  {group.std !== 0 && <div className="text-[10px] font-normal opacity-70 mt-0.5">({group.variancePercent}%)</div>}
                                </td>
                              </>
                            )}
                          </tr>
                          
                          {/* 💡 학교 자율시간 서브로우 (텍스트 흐름 및 버튼 클릭 방해 방지) */}
                          {subAutoTimes.map(aTime => {
                             const text = `[${aTime.grade}학년] ${aTime.name}`;
                             // 글자가 길면 marquee 클래스 적용, 아니면 정지
                             const isLong = text.length > 10;

                             return (
                              <tr key={aTime.id} className="bg-blue-50/30 dark:bg-blue-900/20 hover:bg-blue-50/60 dark:hover:bg-blue-900/40 transition-colors border-b border-slate-100 dark:border-slate-700/50">
                                <td className="p-2 border-r dark:border-slate-700 text-left relative group/subrow h-[36px]">
                                  <div className="flex items-center justify-between h-full">
                                    <div className={isLong ? 'marquee-container h-full pt-1' : 'px-1'}>
                                      <div className={`text-[11px] font-bold text-blue-700 dark:text-blue-400 ${isLong ? 'marquee-content' : ''}`}>
                                        <span className="text-slate-400 dark:text-slate-500 mr-1">└</span>{text}
                                      </div>
                                    </div>
                                    {/* 💡 삭제 버튼 클릭 이벤트 수정 (e.stopPropagation 추가) */}
                                    <div className="flex gap-1 opacity-0 group-hover/subrow:opacity-100 transition-opacity bg-white dark:bg-slate-800 rounded px-1.5 py-0.5 shadow-sm absolute right-1 z-10">
                                      <button onClick={(e) => { e.stopPropagation(); openModal(aTime.grade, aTime.id); }} className="text-slate-400 hover:text-blue-600 p-1"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                      <button onClick={(e) => { e.stopPropagation(); deleteAutoTime(e, aTime.id); }} className="text-slate-400 hover:text-red-600 p-1"><i className="fa-solid fa-xmark text-[10px]"></i></button>
                                    </div>
                                  </div>
                                </td>
                                {aTime.grade === g1 ? (
                                  <>
                                    {renderSubInputCell(aTime.id, 's1', aTime.s1, handleAutoTimeHours)}
                                    {renderSubInputCell(aTime.id, 's2', aTime.s2, handleAutoTimeHours)}
                                    <td className="p-2 border-r dark:border-slate-700 font-bold text-blue-500 dark:text-blue-400 bg-blue-50/30 dark:bg-blue-900/30 text-[11px]">{aTime.s1 + aTime.s2}</td>
                                    <td colSpan={3} className="p-2 border-r dark:border-slate-700 bg-slate-100/50 dark:bg-slate-900/50"></td>
                                  </>
                                ) : (
                                  <>
                                    <td colSpan={3} className="p-2 border-r dark:border-slate-700 bg-slate-100/50 dark:bg-slate-900/50"></td>
                                    {renderSubInputCell(aTime.id, 's1', aTime.s1, handleAutoTimeHours)}
                                    {renderSubInputCell(aTime.id, 's2', aTime.s2, handleAutoTimeHours)}
                                    <td className="p-2 border-r dark:border-slate-700 font-bold text-blue-500 dark:text-blue-400 bg-blue-50/30 dark:bg-blue-900/30 text-[11px]">{aTime.s1 + aTime.s2}</td>
                                  </>
                                )}
                              </tr>
                             );
                          })}
                        </React.Fragment>
                      );
                    })}
                  </tbody>
                );
              })}
            </table>
          </div>
          
          <div className="flex gap-4 p-4 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl shadow-sm shrink-0">
            <button onClick={() => openModal(g1)} className="flex-1 py-2.5 border border-dashed border-blue-400 text-blue-600 dark:text-blue-400 font-bold rounded-lg text-sm hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors">
              <i className="fa-solid fa-plus mr-1"></i> {g1}학년 학교 자율시간 추가
            </button>
            <button onClick={() => openModal(g2)} className="flex-1 py-2.5 border border-dashed border-emerald-500 text-emerald-600 dark:text-emerald-400 font-bold rounded-lg text-sm hover:bg-emerald-50 dark:hover:bg-emerald-900/30 transition-colors">
              <i className="fa-solid fa-plus mr-1"></i> {g2}학년 학교 자율시간 추가
            </button>
          </div>
        </div>
      );
    }

    // 메인 과목 입력 셀
    function renderInputCell(grade, sub, sem, value, handler) {
      return (
        <td className="py-1 px-1.5 border-r dark:border-slate-700 align-middle">
          <div className="relative flex items-center justify-center w-[4.5rem] mx-auto border border-slate-200 dark:border-slate-600 rounded shadow-sm bg-white dark:bg-slate-700 hover:border-blue-400 transition-colors">
            <input type="number" value={value === 0 ? '' : value} onChange={(e) => handler(grade, sub, sem, e.target.value)} placeholder="0"
              className="w-full text-center font-bold text-[13px] bg-transparent focus:outline-none focus:bg-yellow-50 dark:focus:bg-slate-600 py-1 pr-4 pl-1" />
            <div className="absolute right-0 top-0 bottom-0 w-4 flex flex-col border-l border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-800">
              <button onClick={() => handler(grade, sub, sem, (value === '' ? 0 : value) + 1)} className="h-1/2 w-full text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 hover:text-blue-600 flex justify-center items-center border-b border-slate-200 dark:border-slate-600"><i className="fa-solid fa-caret-up text-[10px]"></i></button>
              <button onClick={() => handler(grade, sub, sem, Math.max(0, (value === '' ? 0 : value) - 1))} className="h-1/2 w-full text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 hover:text-blue-600 flex justify-center items-center"><i className="fa-solid fa-caret-down text-[10px]"></i></button>
            </div>
          </div>
        </td>
      );
    }

    // 자율시간 서브로우 전용 입력 셀
    function renderSubInputCell(id, sem, value, handler) {
      return (
        <td className="py-1 px-1.5 border-r dark:border-slate-700 align-middle bg-blue-50/10 dark:bg-blue-900/10">
          <div className="relative flex items-center justify-center w-[4rem] mx-auto border border-blue-200 dark:border-blue-800 rounded overflow-hidden bg-white dark:bg-slate-700 hover:border-blue-400">
            <input type="number" value={value === 0 ? '' : value} onChange={(e) => handler(id, sem, e.target.value)} placeholder="0"
              className="w-full text-center font-bold text-[12px] text-blue-700 dark:text-blue-300 bg-transparent focus:outline-none focus:bg-yellow-50 dark:focus:bg-slate-600 py-1 pr-3 pl-1" />
            <div className="absolute right-0 top-0 bottom-0 w-3.5 flex flex-col border-l border-blue-100 dark:border-blue-800 bg-blue-50 dark:bg-slate-800">
              <button onClick={() => handler(id, sem, (value === '' ? 0 : value) + 1)} className="h-1/2 text-blue-400 hover:bg-blue-200 dark:hover:bg-slate-600 border-b border-blue-100 dark:border-blue-800 flex justify-center items-center"><i className="fa-solid fa-caret-up text-[9px]"></i></button>
              <button onClick={() => handler(id, sem, Math.max(0, (value === '' ? 0 : value) - 1))} className="h-1/2 text-blue-400 hover:bg-blue-200 dark:hover:bg-slate-600 flex justify-center items-center"><i className="fa-solid fa-caret-down text-[9px]"></i></button>
            </div>
          </div>
        </td>
      );
    }

    // 시스템 설정 (다크모드)
    function SettingsScreen({ isDarkMode, setIsDarkMode }) {
      return (
        <div className="max-w-3xl mx-auto space-y-6 animate-in fade-in pt-8">
          <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 className="text-xl font-black mb-6 border-b dark:border-slate-700 pb-4"><i className="fa-solid fa-gear mr-2 text-blue-500"></i> 시스템 설정</h3>
            <div className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700">
              <div>
                <p className="font-bold text-slate-800 dark:text-slate-200">어두운 테마 (Dark Mode)</p>
                <p className="text-sm text-slate-500 mt-1">눈의 피로를 덜어주는 어두운 배경 모드를 활성화합니다.</p>
              </div>
              <button onClick={() => setIsDarkMode(!isDarkMode)} className={`relative inline-flex h-7 w-12 items-center rounded-full transition-colors ${isDarkMode ? 'bg-blue-600' : 'bg-slate-300'}`}>
                <span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform ${isDarkMode ? 'translate-x-6' : 'translate-x-1'}`} />
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DashboardScreen({ analysisAll }) {
      return (
        <div className="max-w-6xl mx-auto grid grid-cols-3 gap-6 animate-in fade-in h-full">
          <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 h-36">
            <p className="text-[11px] font-bold text-slate-400 uppercase">전체 진행률</p>
            <p className="text-3xl font-black mt-2">85%</p>
          </div>
          {analysisAll.hasAnyGlobalError && (
             <div className="col-span-2 bg-red-50 dark:bg-red-900/30 p-6 rounded-2xl shadow-sm border border-red-200 dark:border-red-800 h-36 flex items-center gap-4">
              <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i>
              <div>
                <p className="font-bold text-red-600 dark:text-red-400">시스템 알림: 법정 시수 결함 감지</p>
                <p className="text-sm text-red-500 dark:text-red-300 mt-1">전체보기 탭을 확인하여 붉은색으로 점멸하는 학년군의 오류를 수정하세요.</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MenuBtn({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all ${active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
          <i className={`fa-solid ${icon} w-5 text-center text-[13px]`}></i> <span className="text-[13px] font-bold">{label}</span>
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
