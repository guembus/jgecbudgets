<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sazabi Master OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    body, html { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; height: 100%; margin: 0; overflow: hidden; background-color: #f8fafc; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

    /* 💡 마키(물 흐르는) 효과 */
    .marquee-container { width: 100%; max-width: 140px; overflow: hidden; position: relative; white-space: nowrap; display: flex; align-items: center; }
    .marquee-content { display: inline-block; padding-left: 100%; animation: scroll-left 6s linear infinite; }
    @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }

    /* 💡 헤더 고정 (Sticky) 완벽 패치 */
    .table-wrapper { overflow-y: auto; height: 100%; position: relative; }
    .table-wrapper table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .table-wrapper thead th { position: sticky; z-index: 20; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; }
    .dark .table-wrapper thead th { border-bottom: 1px solid #334155; border-right: 1px solid #334155; }
    .table-wrapper thead tr:nth-child(1) th { top: 0; }
    /* 2번째 줄 헤더 높이 수동 보정 (브라우저별 깨짐 방지) */
    .table-wrapper thead tr:nth-child(2) th { top: 37px; z-index: 19; } 
    .table-wrapper tbody td { border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; }
    .dark .table-wrapper tbody td { border-bottom: 1px solid #1e293b; border-right: 1px solid #1e293b; }
    
    /* 좌측 테두리 마감 */
    .table-wrapper th:first-child, .table-wrapper td:first-child { border-left: 1px solid #cbd5e1; }
    .dark .table-wrapper th:first-child, .dark .table-wrapper td:first-child { border-left: 1px solid #334155; }
  </style>
</head>
<body>
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const GRADE_GROUP_DATA = {
      '1-2': {
        grades: [1, 2], total: 1744,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 482 },
          { id: 'math', name: '수학', subjects: ['math'], std: 256 },
          { id: 'integrated', name: '바/슬/즐', subjects: ['disciplined', 'wise', 'pleasant'], std: 768 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 238 }
        ]
      },
      '3-4': {
        grades: [3, 4], total: 1972,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science', name: '과학', subjects: ['science'], std: 204 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 136 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_career'], std: 204 }
        ]
      },
      '5-6': {
        grades: [5, 6], total: 2176,
        groups: [
          { id: 'korean', name: '국어', subjects: ['korean'], std: 408 },
          { id: 'social_moral', name: '사회/도덕', subjects: ['social', 'moral'], std: 272 },
          { id: 'math', name: '수학', subjects: ['math'], std: 272 },
          { id: 'science_practical', name: '과학/실과', subjects: ['science', 'practical'], std: 340 },
          { id: 'physical', name: '체육', subjects: ['physical'], std: 204 },
          { id: 'arts', name: '예술(음/미)', subjects: ['music', 'art'], std: 272 },
          { id: 'english', name: '영어', subjects: ['english'], std: 204 },
          { id: 'creative', name: '창체', subjects: ['creative_auto', 'creative_club', 'creative_volunteer', 'creative_career'], std: 204 }
        ]
      }
    };

    const SUBJECT_NAME = {
      korean: '국어', social: '사회', moral: '도덕', math: '수학', science: '과학',
      practical: '실과', physical: '체육', music: '음악', art: '미술', english: '영어',
      disciplined: '바른생활', wise: '슬기로운생활', pleasant: '즐거운생활',
      creative_auto: '자율활동', creative_club: '동아리', creative_volunteer: '봉사활동', creative_career: '진로활동'
    };

    const getGroupOfGrade = (grade) => {
      if (grade <= 2) return '1-2';
      if (grade <= 4) return '3-4';
      return '5-6';
    };

    const getAllSubjects = (groupId) => {
      let subs = [];
      GRADE_GROUP_DATA[groupId].groups.forEach(g => {
        g.subjects.forEach(s => subs.push({ id: s, name: SUBJECT_NAME[s], group: g.name }));
      });
      return subs;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('시수편제');
      const [selectedTab, setSelectedTab] = useState(6); // 1~6, 'all'
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [modalState, setModalState] = useState({ isOpen: false, grade: null, editingId: null });
      const [formData, setFormData] = useState({ linkedSub: '', name: '' });

      const [cohorts, setCohorts] = useState(() => {
        const initial = {};
        [1, 2, 3, 4, 5, 6].forEach(tabId => {
          const groupId = getGroupOfGrade(tabId);
          const [g1, g2] = GRADE_GROUP_DATA[groupId].grades;
          initial[tabId] = { hours: { [g1]: {}, [g2]: {} }, autoTimes: [] };
          
          GRADE_GROUP_DATA[groupId].groups.forEach(gInfo => {
            gInfo.subjects.forEach(sub => {
              // 💡 8차 피드백 반영: PDF 하드코딩 삭제. 총론 기준 균등 분배로 초기화
              const perSem = Math.floor(gInfo.std / gInfo.subjects.length / 4);
              const remainder = (gInfo.std / gInfo.subjects.length) - (perSem * 4);
              initial[tabId].hours[g1][sub] = { s1: perSem, s2: perSem };
              initial[tabId].hours[g2][sub] = { s1: perSem, s2: perSem + Math.round(remainder) };
            });
          });
        });
        return initial;
      });

      const handleInput = (tabId, grade, sub, sem, val) => {
        const strVal = String(val).replace(/^0+/, ''); 
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setCohorts(prev => ({
          ...prev, [tabId]: { ...prev[tabId], hours: { ...prev[tabId].hours, [grade]: { ...prev[tabId].hours[grade], [sub]: { ...prev[tabId].hours[grade][sub], [sem]: num } } } }
        }));
      };

      const handleAutoTimeHours = (tabId, id, sem, val) => {
        const strVal = String(val).replace(/^0+/, '');
        let num = strVal === '' ? 0 : parseInt(strVal, 10);
        if (num < 0) num = 0;
        setCohorts(prev => ({
          ...prev, [tabId]: { ...prev[tabId], autoTimes: prev[tabId].autoTimes.map(item => item.id === id ? { ...item, [sem]: num } : item) }
        }));
      };

      const openModal = (grade, editId = null) => {
        const cohortTimes = cohorts[selectedTab].autoTimes;
        if (!editId && cohortTimes.filter(a => a.grade === grade).length >= 2) return alert(`${grade}학년 자율시간은 최대 2개까지만 추가할 수 있습니다.`);
        if (editId) {
          const item = cohortTimes.find(a => a.id === editId);
          setFormData({ linkedSub: item.linkedSub, name: item.name });
        } else setFormData({ linkedSub: '', name: '' });
        setModalState({ isOpen: true, grade, editingId: editId });
      };

      const saveModal = () => {
        if (!formData.linkedSub || !formData.name.trim()) return alert('연계 교과와 자율시간 과목명을 입력해주세요.');
        setCohorts(prev => {
          const newTimes = modalState.editingId 
            ? prev[selectedTab].autoTimes.map(item => item.id === modalState.editingId ? { ...item, linkedSub: formData.linkedSub, name: formData.name } : item)
            : [...prev[selectedTab].autoTimes, { id: Date.now().toString(), grade: modalState.grade, linkedSub: formData.linkedSub, name: formData.name, s1: 0, s2: 0 }];
          return { ...prev, [selectedTab]: { ...prev[selectedTab], autoTimes: newTimes } };
        });
        setModalState({ isOpen: false, grade: null, editingId: null });
      };

      const deleteAutoTime = (tabId, id) => {
        if(confirm('자율시간을 삭제하시겠습니까?')) {
          setCohorts(prev => ({ ...prev, [tabId]: { ...prev[tabId], autoTimes: prev[tabId].autoTimes.filter(a => a.id !== id) } }));
        }
      };

      const analyzeCohort = (tabId) => {
        if (tabId === 'all') return null;
        const cohort = cohorts[tabId];
        const groupId = getGroupOfGrade(tabId);
        const config = GRADE_GROUP_DATA[groupId];
        const [g1, g2] = config.grades;
        
        let groupTotal = 0;
        const groupStats = config.groups.map(g => {
          let sum = g.subjects.reduce((s, sub) => s + cohort.hours[g1][sub].s1 + cohort.hours[g1][sub].s2 + cohort.hours[g2][sub].s1 + cohort.hours[g2][sub].s2, 0);
          cohort.autoTimes.forEach(auto => {
            if (g.subjects.includes(auto.linkedSub)) sum += auto.s1 + auto.s2;
          });
          groupTotal += sum;
          const diff = sum - g.std;
          const variancePercent = g.std === 0 ? 0 : Math.round((diff / g.std) * 100);
          const isOver20 = variancePercent > 20;
          const isUnder20 = variancePercent < -20;
          return { ...g, current: sum, diff, variancePercent, isOver20, isUnder20 };
        });

        const isTotalDeficient = groupTotal < config.total;
        const hasAnyError = isTotalDeficient || groupStats.some(g => g.isOver20 || g.isUnder20);
        return { groupStats, groupTotal, targetTotal: config.total, grades: [g1, g2], isTotalDeficient, hasAnyError };
      };

      const currentAnalysis = selectedTab !== 'all' ? analyzeCohort(selectedTab) : null;

      const extractCurrentYearData = () => {
        const currentYearHours = {};
        const currentYearAutoTimes = [];
        const cohortErrors = {};

        [1,2,3,4,5,6].forEach(tabId => {
          currentYearHours[tabId] = cohorts[tabId].hours[tabId];
          cohorts[tabId].autoTimes.forEach(auto => {
            if (auto.grade === tabId) currentYearAutoTimes.push({ ...auto, cohortId: tabId });
          });
          cohortErrors[tabId] = analyzeCohort(tabId).hasAnyError;
        });
        return { hours: currentYearHours, autoTimes: currentYearAutoTimes, errors: cohortErrors };
      };

      return (
        <div className={`h-full ${isDarkMode ? 'dark' : ''}`}>
          <div className="flex h-screen text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-950 overflow-hidden relative">
            
            <aside className="w-56 bg-slate-900 dark:bg-black flex flex-col shadow-2xl z-20 shrink-0 border-r border-slate-800">
              <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg"><i className="fa-solid fa-shield-halved text-white"></i></div>
                <h1 className="text-white font-black text-base uppercase tracking-tight">Sazabi OS</h1>
              </div>
              <nav className="flex-grow p-4 space-y-2 overflow-y-auto custom-scrollbar">
                <MenuBtn icon="fa-chart-pie" label="대시보드" active={activeTab === '대시보드'} onClick={() => setActiveTab('대시보드')} />
                <MenuBtn icon="fa-table-cells" label="시수편제" active={activeTab === '시수편제'} onClick={() => setActiveTab('시수편제')} />
                <MenuBtn icon="fa-calendar-days" label="학사일정" active={activeTab === '학사일정'} onClick={() => setActiveTab('학사일정')} />
                <MenuBtn icon="fa-user-graduate" label="학생평가" active={activeTab === '학생평가'} onClick={() => setActiveTab('학생평가')} />
                <MenuBtn icon="fa-users" label="반편성" active={activeTab === '반편성'} onClick={() => setActiveTab('반편성')} />
                <MenuBtn icon="fa-gear" label="시스템설정" active={activeTab === '설정'} onClick={() => setActiveTab('설정')} />
              </nav>
              <div className="p-5 bg-slate-950 dark:bg-slate-900 border-t border-slate-800 flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center"><i className="fa-solid fa-user-tie text-slate-400 text-xs"></i></div>
                <div><p className="text-white text-xs font-bold">사자비 부장</p><p className="text-slate-500 text-[10px]">연구부 총괄</p></div>
              </div>
            </aside>

            <main className="flex-grow flex flex-col min-w-0 relative">
              <header className="h-20 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shadow-sm z-10 shrink-0">
                <div className="flex items-center gap-6">
                  <h2 className="text-xl font-black">{activeTab}</h2>
                  {activeTab === '시수편제' && (
                    <div className="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                      {[1, 2, 3, 4, 5, 6].map(g => (
                        <button key={g} onClick={() => setSelectedTab(g)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${selectedTab === g ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-md border border-slate-200 dark:border-slate-600' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                          {g}학년
                        </button>
                      ))}
                      <div className="w-px h-6 bg-slate-300 dark:bg-slate-600 mx-2 my-auto"></div>
                      <button onClick={() => setSelectedTab('all')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${selectedTab === 'all' ? 'bg-slate-800 dark:bg-slate-700 text-white shadow-md border border-slate-700 dark:border-slate-600' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                        전체보기
                      </button>
                    </div>
                  )}
                </div>
              </header>

              <div className="flex-grow p-6 overflow-hidden flex flex-col bg-slate-50 dark:bg-slate-950">
                {activeTab === '시수편제' && selectedTab !== 'all' && currentAnalysis && (
                  <CurriculumScreen 
                    tabId={selectedTab} analysis={currentAnalysis} cohortData={cohorts[selectedTab]} 
                    handleInput={handleInput} openModal={openModal} handleAutoTimeHours={handleAutoTimeHours} deleteAutoTime={deleteAutoTime}
                  />
                )}
                {activeTab === '시수편제' && selectedTab === 'all' && (
                  <AllGradesDetailedScreen extractedData={extractCurrentYearData()} />
                )}
                {activeTab === '설정' && <SettingsScreen isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />}
                {activeTab === '대시보드' && <DashboardScreen />}
                {!['시수편제', '대시보드', '설정'].includes(activeTab) && (
                  <div className="flex-grow flex flex-col items-center justify-center text-slate-400 dark:text-slate-600">
                    <i className="fa-solid fa-wrench fa-3x mb-4 opacity-30"></i>
                    <h3 className="text-lg font-bold">{activeTab} 메뉴 준비 중</h3>
                  </div>
                )}
              </div>
            </main>
          </div>

          {/* 자율시간 추가 모달 */}
          {modalState.isOpen && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] flex items-center justify-center">
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 max-w-sm w-full shadow-2xl border border-slate-200 dark:border-slate-700 animate-in zoom-in-95">
                <h3 className="text-lg font-black mb-6 border-b dark:border-slate-700 pb-3"><i className="fa-solid fa-flask text-blue-500 mr-2"></i> {modalState.grade}학년 자율시간 추가</h3>
                <div className="space-y-4 mb-8">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">연계 교과</label>
                    <select value={formData.linkedSub} onChange={e => setFormData({...formData, linkedSub: e.target.value})} className="w-full p-2.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-lg text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 dark:text-slate-200">
                      <option value="">-- 교과 선택 --</option>
                      {getAllSubjects(getGroupOfGrade(selectedTab === 'all' ? 1 : selectedTab)).map(s => <option key={s.id} value={s.id}>[{s.group}] {s.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">과목명</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="예: 우리고장 생태" className="w-full p-2.5 border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 rounded-lg text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 dark:text-slate-200" />
                  </div>
                </div>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setModalState({isOpen: false})} className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 font-bold rounded-xl text-sm transition-colors">취소</button>
                  <button onClick={saveModal} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm shadow-md transition-colors">적용</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /** 💡 개별 코호트 편집 화면 */
    function CurriculumScreen({ tabId, analysis, cohortData, handleInput, openModal, handleAutoTimeHours, deleteAutoTime }) {
      const [g1, g2] = analysis.grades;
      // 💡 연도 표기 완벽 적용: 2027년도 목표 코호트
      const isOdd = tabId % 2 !== 0; 
      const title1 = isOdd ? `${g1}학년 (2027학년도 편성)` : `${g1}학년 (2026학년도 실적)`;
      const title2 = isOdd ? `${g2}학년 (2028학년도 계획)` : `${g2}학년 (2027학년도 편성)`;

      return (
        <div className="flex-grow flex flex-col gap-4 overflow-hidden">
          <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0">
            <h2 className="text-xl font-black">{tabId}학년 코호트 기준 편제표</h2>
            <div className="flex items-center gap-4">
              <div className={`px-5 py-2 rounded-xl flex items-center gap-3 ${analysis.isTotalDeficient ? 'bg-red-50 dark:bg-red-900/30 border-2 border-red-400 dark:border-red-600' : 'bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700'}`}>
                <span className={`text-xs font-bold ${analysis.isTotalDeficient ? 'text-red-500 dark:text-red-400' : 'text-slate-500 dark:text-slate-400'}`}>학년군 2년 총계</span>
                <span className={`text-lg font-black ${analysis.isTotalDeficient ? 'text-red-600 dark:text-red-400' : 'text-blue-700 dark:text-blue-400'}`}>{analysis.groupTotal} <span className="text-sm font-normal text-slate-400">/ {analysis.targetTotal}H</span></span>
              </div>
              <button onClick={() => alert('저장되었습니다.')} className="flex items-center gap-2 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm shadow-md transition-colors"><i className="fa-solid fa-floppy-disk"></i> 저장</button>
            </div>
          </div>

          <div className="table-wrapper bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm flex-grow bg-slate-50 dark:bg-slate-900">
            <table>
              <thead className="bg-[#f8fafc] dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[13px] font-bold text-center">
                <tr>
                  <th rowSpan={2} className="py-2.5 px-2 w-24 bg-[#f8fafc] dark:bg-slate-800">교과군</th>
                  <th rowSpan={2} className="py-2.5 px-2 w-28 bg-[#f8fafc] dark:bg-slate-800">교과목</th>
                  <th colSpan={3} className="py-2.5 px-2 bg-blue-50/80 dark:bg-blue-900/40 text-blue-800 dark:text-blue-300">{title1}</th>
                  <th colSpan={3} className="py-2.5 px-2 bg-emerald-50/80 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300">{title2}</th>
                  <th rowSpan={2} className="py-2.5 px-2 w-16 bg-[#f8fafc] dark:bg-slate-800">기준</th>
                  <th rowSpan={2} className="py-2.5 px-2 w-16 bg-[#f8fafc] dark:bg-slate-800">합계</th>
                  <th rowSpan={2} className="py-2.5 px-2 w-20 bg-[#f8fafc] dark:bg-slate-800">증감</th>
                </tr>
                <tr className="bg-white dark:bg-slate-800 text-[11px] text-slate-500 dark:text-slate-400">
                  <th className="sub-header py-1.5 w-16 bg-blue-50/30 dark:bg-blue-900/20">1학기</th><th className="sub-header py-1.5 w-16 bg-blue-50/30 dark:bg-blue-900/20">2학기</th><th className="sub-header py-1.5 w-14 bg-blue-100/50 dark:bg-blue-900/50 text-slate-600 dark:text-slate-300 font-bold">소계</th>
                  <th className="sub-header py-1.5 w-16 bg-emerald-50/30 dark:bg-emerald-900/20">1학기</th><th className="sub-header py-1.5 w-16 bg-emerald-50/30 dark:bg-emerald-900/20">2학기</th><th className="sub-header py-1.5 w-14 bg-emerald-100/50 dark:bg-emerald-900/50 text-slate-600 dark:text-slate-300 font-bold">소계</th>
                </tr>
              </thead>
              
              <tbody className="text-center text-[12px] text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900">
                {analysis.groupStats.map((group) => {
                  // 💡 깜빡임 애니메이션 제외, 직관적인 솔리드 붉은 테두리
                  const hasError = group.isOver20 || group.isUnder20;
                  const groupAutoTimes = cohortData.autoTimes.filter(a => group.subjects.includes(a.linkedSub));
                  const rowSpanCount = group.subjects.length + groupAutoTimes.length;

                  return (
                    <React.Fragment key={group.id}>
                      {group.subjects.map((sub, idx) => {
                        const s1_1 = cohortData.hours[g1][sub].s1; const s1_2 = cohortData.hours[g1][sub].s2;
                        const s2_1 = cohortData.hours[g2][sub].s1; const s2_2 = cohortData.hours[g2][sub].s2;
                        const subAutoTimes = cohortData.autoTimes.filter(a => a.linkedSub === sub);

                        return (
                          <React.Fragment key={sub}>
                            <tr className={`hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors ${hasError ? 'bg-red-50/30 dark:bg-red-900/10' : ''}`}>
                              {idx === 0 && (
                                <td rowSpan={rowSpanCount} className={`p-2 font-bold align-middle bg-slate-50/50 dark:bg-slate-800/30 text-[13px] ${hasError ? 'border-l-4 border-l-red-500 text-red-600 dark:text-red-400' : ''}`}>
                                  {group.name}
                                </td>
                              )}
                              <td className="p-2 font-medium">{SUBJECT_NAME[sub]}</td>
                              
                              {renderModernInput(s1_1, (val) => handleInput(tabId, g1, sub, 's1', val))}
                              {renderModernInput(s1_2, (val) => handleInput(tabId, g1, sub, 's2', val))}
                              <td className="p-2 font-bold text-slate-400 dark:text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">{s1_1 + s1_2}</td>
                              
                              {renderModernInput(s2_1, (val) => handleInput(tabId, g2, sub, 's1', val))}
                              {renderModernInput(s2_2, (val) => handleInput(tabId, g2, sub, 's2', val))}
                              <td className="p-2 font-bold text-slate-400 dark:text-slate-500 bg-slate-50/50 dark:bg-slate-800/30">{s2_1 + s2_2}</td>
                              
                              {idx === 0 && (
                                <>
                                  <td rowSpan={rowSpanCount} className="p-2 font-bold text-slate-400 dark:text-slate-500 align-middle">{group.std}</td>
                                  <td rowSpan={rowSpanCount} className={`p-2 font-black text-[15px] align-middle ${hasError ? 'text-red-600 dark:text-red-400' : 'text-blue-600 dark:text-blue-400'}`}>{group.current}</td>
                                  <td rowSpan={rowSpanCount} className={`p-2 font-bold text-[12px] align-middle ${hasError ? 'text-red-600 dark:text-red-400' : 'text-slate-500 dark:text-slate-400'}`}>
                                    {group.diff > 0 ? `+${group.diff}` : group.diff}
                                    <div className="text-[10px] font-normal opacity-70">({group.variancePercent}%)</div>
                                  </td>
                                </>
                              )}
                            </tr>
                            
                            {/* 자율시간 서브로우 */}
                            {subAutoTimes.map((aTime) => {
                              const isLong = aTime.name.length > 8;
                              return (
                                <tr key={aTime.id} className={`bg-blue-50/20 dark:bg-blue-900/10 hover:bg-blue-50/50 dark:hover:bg-blue-900/30 transition-colors ${hasError ? 'bg-red-50/30 dark:bg-red-900/10' : ''}`}>
                                  <td className="p-1.5 text-left relative group/subrow overflow-hidden">
                                    <div className="flex items-center justify-between px-2">
                                      <div className={isLong ? 'marquee-container' : ''}>
                                        <div className={`text-[11px] font-bold text-blue-600 dark:text-blue-400 ${isLong ? 'marquee-content' : ''}`}>
                                          <span className="text-slate-400 dark:text-slate-500 mr-1">└</span>[{aTime.grade}] {aTime.name}
                                        </div>
                                      </div>
                                      <div className="flex gap-1 opacity-0 group-hover/subrow:opacity-100 bg-white dark:bg-slate-800 rounded shadow-sm absolute right-1 z-10 px-1 py-0.5">
                                        <button onClick={(e) => { e.stopPropagation(); openModal(aTime.grade, aTime.id); }} className="text-slate-400 hover:text-blue-600"><i className="fa-solid fa-pen text-[9px]"></i></button>
                                        <button onClick={(e) => { e.stopPropagation(); deleteAutoTime(tabId, aTime.id); }} className="text-slate-400 hover:text-red-600"><i className="fa-solid fa-xmark text-[9px]"></i></button>
                                      </div>
                                    </div>
                                  </td>
                                  {aTime.grade === g1 ? (
                                    <>
                                      {renderModernInput(aTime.s1, (val) => handleAutoTimeHours(tabId, aTime.id, 's1', val), true)}
                                      {renderModernInput(aTime.s2, (val) => handleAutoTimeHours(tabId, aTime.id, 's2', val), true)}
                                      <td className="p-1.5 font-bold text-blue-500 dark:text-blue-400 bg-blue-50/10 dark:bg-blue-900/10">{aTime.s1 + aTime.s2}</td>
                                      <td colSpan={3} className="p-1.5 bg-slate-50/50 dark:bg-slate-800/30"></td>
                                    </>
                                  ) : (
                                    <>
                                      <td colSpan={3} className="p-1.5 bg-slate-50/50 dark:bg-slate-800/30"></td>
                                      {renderModernInput(aTime.s1, (val) => handleAutoTimeHours(tabId, aTime.id, 's1', val), true)}
                                      {renderModernInput(aTime.s2, (val) => handleAutoTimeHours(tabId, aTime.id, 's2', val), true)}
                                      <td className="p-1.5 font-bold text-blue-500 dark:text-blue-400 bg-blue-50/10 dark:bg-blue-900/10">{aTime.s1 + aTime.s2}</td>
                                    </>
                                  )}
                                </tr>
                              );
                            })}
                          </React.Fragment>
                        );
                      })}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="flex gap-4 shrink-0 mt-1">
            <button onClick={() => openModal(g1)} className="flex-1 py-3 border border-dashed border-blue-400 dark:border-blue-600 bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 font-bold rounded-xl text-sm hover:bg-blue-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
              <i className="fa-solid fa-plus mr-2"></i> {g1}학년 자율시간 추가
            </button>
            <button onClick={() => openModal(g2)} className="flex-1 py-3 border border-dashed border-emerald-400 dark:border-emerald-600 bg-white dark:bg-slate-800 text-emerald-600 dark:text-emerald-400 font-bold rounded-xl text-sm hover:bg-emerald-50 dark:hover:bg-slate-700 transition-colors shadow-sm">
              <i className="fa-solid fa-plus mr-2"></i> {g2}학년 자율시간 추가
            </button>
          </div>
        </div>
      );
    }

    // 💡 가장 쾌적한 "숫자 옆 화살표" 모던 입력셀
    function renderModernInput(value, onChangeVal, isAuto=false) {
      return (
        <td className="p-1.5 align-middle">
          <div className="relative flex items-center justify-between w-[4.8rem] mx-auto border border-slate-200 dark:border-slate-600 rounded-lg shadow-sm bg-white dark:bg-slate-800 focus-within:border-blue-400 dark:focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-400 transition-all overflow-hidden">
            <input type="number" value={value === 0 ? '' : value} onChange={(e) => onChangeVal(e.target.value)} placeholder="0"
              className={`w-full text-center font-bold text-[13px] bg-transparent outline-none py-1 pr-4 pl-1 ${isAuto ? 'text-blue-600 dark:text-blue-400' : 'text-slate-800 dark:text-slate-200'}`} />
            <div className="absolute right-0 top-0 bottom-0 w-4 flex flex-col border-l border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900">
              <button onClick={() => onChangeVal((value === '' ? 0 : value) + 1)} className="h-1/2 w-full text-slate-400 dark:text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 flex justify-center items-center border-b border-slate-200 dark:border-slate-600"><i className="fa-solid fa-caret-up text-[10px]"></i></button>
              <button onClick={() => onChangeVal(Math.max(0, (value === '' ? 0 : value) - 1))} className="h-1/2 w-full text-slate-400 dark:text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 flex justify-center items-center"><i className="fa-solid fa-caret-down text-[10px]"></i></button>
            </div>
          </div>
        </td>
      );
    }

    /** 💡 [전체보기 탭] 팝업 없는 한글(HWP) 출력 + 직관적인 행렬 뷰 */
    function AllGradesDetailedScreen({ extractedData }) {
      const MATRIX_ROWS = [
        { group: '국어', subs: ['korean'] }, { group: '수학', subs: ['math'] }, { group: '바/슬/즐', subs: ['disciplined', 'wise', 'pleasant'] },
        { group: '사회/도덕', subs: ['social', 'moral'] }, { group: '과학/실과', subs: ['science', 'practical'] },
        { group: '체육', subs: ['physical'] }, { group: '예술(음/미)', subs: ['music', 'art'] }, { group: '영어', subs: ['english'] },
        { group: '창체', subs: ['creative_auto', 'creative_club', 'creative_volunteer', 'creative_career'] }
      ];

      const getCellVal = (grade, sub) => (extractedData.hours[grade] && extractedData.hours[grade][sub] !== undefined) ? extractedData.hours[grade][sub].s1 + extractedData.hours[grade][sub].s2 : '';
      const getAutoTimeVal = (grade) => extractedData.autoTimes.filter(a => a.grade === grade).reduce((s, a) => s + a.s1 + a.s2, 0);

      // 💡 완벽한 HWP 팝업 회피 로직 (Word RTF 기반 생성)
      const exportToHWP = () => {
        const header = `<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="utf-8"><title>편제표</title>
        <style>table { border-collapse: collapse; width: 100%; text-align: center; font-size: 11pt; font-family: '맑은 고딕', sans-serif; border: 2px solid black; } th, td { border: 1px solid black; padding: 6px; vertical-align: middle; } th { background-color: #f1f5f9; font-weight: bold; } .g-name { background-color: #f8fafc; font-weight: bold; } .total { background-color: #e2e8f0; font-weight: bold; } h2 { text-align: center; font-family: '맑은 고딕'; margin-bottom: 20px; }</style></head><body>
        <h2>2027학년도 전 학년 교육과정 시수 편제표</h2><table>`;
        const thead = `<thead><tr><th rowspan="2">교과군</th><th rowspan="2">교과목</th><th colspan="6">학년별 당해년도(2027) 편성 시수</th></tr><tr><th>1학년</th><th>2학년</th><th>3학년</th><th>4학년</th><th>5학년</th><th>6학년</th></tr></thead><tbody>`;
        
        let tbody = ``;
        MATRIX_ROWS.forEach(group => {
          group.subs.forEach((sub, idx) => {
            tbody += `<tr>`;
            if (idx === 0) tbody += `<td rowspan="${group.subs.length}" class="g-name">${group.group}</td>`;
            tbody += `<td>${SUBJECT_NAME[sub]}</td>`;
            [1,2,3,4,5,6].forEach(g => { const val = getCellVal(g, sub); tbody += `<td>${val === 0 || val === '' ? '-' : val}</td>`; });
            tbody += `</tr>`;
          });
        });
        tbody += `<tr><td colspan="2" class="g-name" style="color:#2563eb;">학교 자율시간 누계</td>`;
        [1,2,3,4,5,6].forEach(g => { const val = getAutoTimeVal(g); tbody += `<td style="color:#2563eb; font-weight:bold;">${val === 0 ? '-' : val}</td>`; });
        tbody += `</tr><tr class="total"><td colspan="2">총계</td>`;
        [1,2,3,4,5,6].forEach(g => {
           let total = getAutoTimeVal(g);
           MATRIX_ROWS.forEach(gr => gr.subs.forEach(sub => { const val = getCellVal(g, sub); if(val !== '') total += val; }));
           tbody += `<td>${total}</td>`;
        });
        tbody += `</tr></tbody></table></body></html>`;

        const blob = new Blob(['\ufeff' + header + thead + tbody], { type: 'application/msword;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `전학년_편제표_출력본.doc`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      return (
        <div className="flex-grow flex flex-col gap-4 overflow-hidden">
          <div className="flex justify-between items-center bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shrink-0 shadow-sm">
            <div><h2 className="text-xl font-black">전체보기</h2></div>
            <button onClick={exportToHWP} className="px-5 py-2.5 bg-slate-900 dark:bg-blue-600 hover:bg-black dark:hover:bg-blue-700 text-white font-bold rounded-xl shadow-md flex items-center gap-2 transition-colors">
              <i className="fa-solid fa-file-word"></i> 파일 다운로드
            </button>
          </div>

          <div className="table-wrapper bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-2xl custom-scrollbar flex-grow p-1 shadow-sm">
            <table>
              <thead className="bg-[#f8fafc] dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[13px] font-bold text-center">
                <tr>
                  <th rowSpan={2} className="py-2.5 px-2 w-20 border-b-2 border-slate-300 dark:border-slate-600 z-30">교과군</th>
                  <th rowSpan={2} className="py-2.5 px-2 w-24 border-b-2 border-slate-300 dark:border-slate-600 z-30">교과목</th>
                  <th colSpan={6} className="py-2 px-2 border-b-2 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800 z-20">2027학년도 편성 시수 (오류 코호트 붉은색 표시)</th>
                </tr>
                <tr className="bg-white dark:bg-slate-900 text-[12px] text-slate-500 dark:text-slate-400">
                  {[1,2,3,4,5,6].map(g => (
                    <th key={g} className={`sub-header py-1.5 w-16 border-b border-slate-200 dark:border-slate-700 ${extractedData.errors[g] ? 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 border-x-2 border-t-2 border-red-500' : 'bg-slate-50 dark:bg-slate-800'}`}>{g}학년</th>
                  ))}
                </tr>
              </thead>
              <tbody className="text-center text-[13px] text-slate-800 dark:text-slate-300 bg-white dark:bg-slate-900">
                {MATRIX_ROWS.map(group => (
                  <React.Fragment key={group.group}>
                    {group.subs.map((sub, idx) => (
                      <tr key={sub} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                        {idx === 0 && <td rowSpan={group.subs.length} className="p-2 align-middle bg-slate-50/50 dark:bg-slate-800/50 font-bold">{group.group}</td>}
                        <td className="p-2 font-medium">{SUBJECT_NAME[sub]}</td>
                        {[1,2,3,4,5,6].map(g => {
                          const val = getCellVal(g, sub);
                          const errClass = extractedData.errors[g] ? 'border-x-2 border-red-500 bg-red-50/20 dark:bg-red-900/10 text-red-700 dark:text-red-400 font-bold ' : '';
                          return <td key={g} className={`p-2 ${errClass}`}>{val === '' || val === 0 ? '-' : val}</td>;
                        })}
                      </tr>
                    ))}
                  </React.Fragment>
                ))}
                <tr className="bg-blue-50/30 dark:bg-blue-900/20 font-bold text-blue-800 dark:text-blue-300">
                  <td colSpan="2" className="p-2.5"><i className="fa-solid fa-flask mr-1"></i> 자율시간 누계</td>
                  {[1,2,3,4,5,6].map(g => {
                    const errClass = extractedData.errors[g] ? 'border-x-2 border-b-2 border-red-500 bg-red-50/20 dark:bg-red-900/10 text-red-700 dark:text-red-400 ' : '';
                    return <td key={g} className={`p-2.5 ${errClass}`}>{getAutoTimeVal(g) === 0 ? '-' : getAutoTimeVal(g)}</td>
                  })}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function SettingsScreen({ isDarkMode, setIsDarkMode }) {
      return (
        <div className="max-w-2xl mx-auto space-y-4 pt-8">
          <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <h3 className="text-xl font-black mb-6 border-b dark:border-slate-700 pb-4"><i className="fa-solid fa-gear mr-2 text-blue-500"></i> 시스템 설정</h3>
            <div className="flex justify-between items-center p-5 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700">
              <div>
                <span className="text-base font-bold text-slate-800 dark:text-slate-200">다크 모드</span>
                <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">눈의 피로를 덜어주는 어두운 배경 모드를 활성화합니다.</p>
              </div>
              <button onClick={() => setIsDarkMode(!isDarkMode)} className={`relative inline-flex h-8 w-14 items-center rounded-full transition-colors ${isDarkMode ? 'bg-blue-600' : 'bg-slate-300 dark:bg-slate-600'}`}>
                <span className={`inline-block h-6 w-6 transform rounded-full bg-white transition-transform ${isDarkMode ? 'translate-x-7' : 'translate-x-1'}`} />
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DashboardScreen() {
      return (
        <div className="max-w-5xl mx-auto grid grid-cols-3 gap-6 pt-6 animate-in fade-in">
          <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm h-40">
            <p className="text-xs font-bold text-slate-400 uppercase">시스템 안정성</p>
            <p className="text-4xl font-black text-blue-600 dark:text-blue-400 mt-3">100%</p>
          </div>
        </div>
      );
    }

    function MenuBtn({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-xl transition-all ${active ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 dark:text-slate-500 hover:bg-slate-800 hover:text-white'}`}>
          <i className={`fa-solid ${icon} w-5 text-center text-base`}></i> <span className="text-sm font-bold">{label}</span>
        </button>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
